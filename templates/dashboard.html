<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Market Insight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .dashboard-chart-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-top: 24px;
        }
        .dashboard-chart-wrapper .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .dashboard-chart-wrapper .chart-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .dashboard-chart-wrapper .chart-header h3 i {
            color: var(--primary);
            margin-right: 10px;
        }
        .dashboard-chart-wrapper .chart-container {
            height: 450px;
            position: relative;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .dashboard-stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .dashboard-stat-card .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
        }
        .dashboard-stat-card .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .dashboard-stat-card .stat-trend {
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
        }
        .dashboard-empty {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .dashboard-empty i {
            font-size: 64px;
            color: var(--text-light);
            margin-bottom: 16px;
        }
        .dashboard-empty h3 {
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .dashboard-empty p {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="toast" class="toast" style="display: none;">
        <div class="toast-content">
            <i class="fas fa-check-circle toast-icon"></i>
            <span id="toastMessage"></span>
        </div>
        <button class="toast-close" onclick="this.parentElement.style.display='none'">&times;</button>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>Market<span>Insight</span></span>
            </div>
            <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a href="/sector-analysis" class="nav-item">
                <i class="fas fa-building"></i>
                <span>Sector Analysis</span>
            </a>
            <a href="/stock-analysis" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Stock Analysis</span>
            </a>
            <a href="/watchlist" class="nav-item">
                <i class="fas fa-star"></i>
                <span>Watchlist</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>Alerts</span>
            </a>
        </nav>
            <div class="sidebar-footer">
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                    <span>Dark Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <span class="header-date"><i class="far fa-calendar-alt"></i> {{ current_date }}</span>
                </div>
                <div class="header-right">
                    <button id="clearCacheBtn" class="btn btn-secondary">
                        <i class="fas fa-sync-alt"></i> Clear Cache
                    </button>
                    <button id="exportData" class="btn btn-secondary">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </header>

            <!-- Controls -->
            <div class="controls-card">
                <div class="controls-row">
                    <div class="control-group">
                        <label><i class="fas fa-clock"></i> Duration</label>
                        <select id="durationSelect" class="form-control">
                            <option value="">Select Duration</option>
                            {% for key, value in durations %}
                            <option value="{{ key }}">{{ value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button id="fetchDataBtn" class="btn btn-primary">
                        <i class="fas fa-rocket"></i> Analyze Market
                    </button>
                </div>
                <div class="loading-indicator" id="loadingIndicator" style="display: none;">
                    <div class="spinner"></div>
                    <span>Analyzing market data...</span>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="dashboard-stats" id="statsGrid" style="display: none;"></div>

            <!-- Main Chart -->
            <div class="dashboard-chart-wrapper" id="chartWrapper" style="display: none;">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-bar"></i> Sector Performance Comparison</h3>
                    <span class="chart-badge" id="chartBadge">All Sectors</span>
                </div>
                <div class="chart-container">
                    <canvas id="sectorComparisonChart"></canvas>
                </div>
            </div>

            <!-- No Data State -->
            <div id="noData" class="dashboard-empty" style="display: none;">
                <i class="fas fa-database"></i>
                <h3>No Data Available</h3>
                <p>Select a duration and click "Analyze Market" to get started.</p>
            </div>
        </main>
    </div>

    <script>
        let currentData = null;
        let comparisonChart = null;
        let toastTimeout = null;

        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            this.querySelector('span').textContent = newTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
            this.querySelector('i').className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            if (comparisonChart) {
                comparisonChart.destroy();
                if (currentData && currentData.data) {
                    createComparisonChart(currentData.data);
                }
            }
        });

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') {
            document.getElementById('themeToggle').querySelector('span').textContent = 'Light Mode';
            document.getElementById('themeToggle').querySelector('i').className = 'fas fa-sun';
        }

        async function fetchData() {
            const duration = document.getElementById('durationSelect').value;
            if (!duration) {
                showToast('Please select a duration', 'warning');
                return;
            }

            // Save duration to localStorage for all pages
            localStorage.setItem('selectedDuration', duration);

            const loadingDiv = document.getElementById('loadingIndicator');
            loadingDiv.style.display = 'flex';

            try {
                const response = await fetch(`/api/sector-data?duration=${duration}`);
                const data = await response.json();

                if (data && data.data) {
                    currentData = data;
                    displayResults(data);
                    showToast('Data loaded successfully!', 'success');
                } else if (data && data.Message) {
                    showToast(data.Message, 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function displayResults(data) {
            // Stats Grid
            const statsHtml = `
                <div class="dashboard-stat-card">
                    <div class="stat-value">${data.summary.total_sectors}</div>
                    <div class="stat-label"><i class="fas fa-building"></i> Total Sectors</div>
                    <div class="stat-trend" style="color: var(--text-secondary);">+${data.summary.total_sectors > 0 ? '12' : '0'}%</div>
                </div>
                <div class="dashboard-stat-card">
                    <div class="stat-value">${data.summary.total_stocks}</div>
                    <div class="stat-label"><i class="fas fa-chart-bar"></i> Total Stocks</div>
                    <div class="stat-trend" style="color: var(--text-secondary);">+${data.summary.total_stocks > 0 ? '8' : '0'}%</div>
                </div>
                <div class="dashboard-stat-card">
                    <div class="stat-value" style="color: ${data.summary.avg_performance >= 0 ? '#48bb78' : '#fc8181'}">${data.summary.avg_performance.toFixed(2)}%</div>
                    <div class="stat-label"><i class="fas fa-arrow-up"></i> Avg Performance</div>
                    <div class="stat-trend" style="color: ${data.summary.avg_performance >= 0 ? '#48bb78' : '#fc8181'}">${data.summary.avg_performance >= 0 ? '+' : ''}${data.summary.avg_performance.toFixed(2)}%</div>
                </div>
                <div class="dashboard-stat-card">
                    <div class="stat-value" style="color: ${data.summary.avg_performance > 2 ? '#48bb78' : data.summary.avg_performance < -2 ? '#fc8181' : '#ed8936'}">
                        ${data.summary.avg_performance > 2 ? 'Bullish' : data.summary.avg_performance < -2 ? 'Bearish' : 'Neutral'}
                    </div>
                    <div class="stat-label"><i class="fas fa-trend-up"></i> Market Sentiment</div>
                    <div class="stat-trend" style="color: var(--text-secondary);">•</div>
                </div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;
            document.getElementById('statsGrid').style.display = 'grid';

            // Chart
            createComparisonChart(data.data);
            document.getElementById('chartWrapper').style.display = 'block';
            document.getElementById('chartBadge').textContent = `${data.data.length} Sectors`;
            document.getElementById('noData').style.display = 'none';
        }

        function createComparisonChart(sectors) {
            const ctx = document.getElementById('sectorComparisonChart').getContext('2d');
            
            if (comparisonChart) {
                comparisonChart.destroy();
            }

            const sorted = [...sectors].sort((a, b) => b.percentage_change - a.percentage_change);
            const labels = sorted.map(s => s.sector);
            const data = sorted.map(s => s.percentage_change);
            const colors = data.map(v => v >= 0 ? '#48bb78' : '#fc8181');

            comparisonChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Performance (%)',
                        data: data,
                        backgroundColor: colors,
                        borderColor: getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim() || '#ffffff',
                        borderWidth: 2,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y >= 0 ? '+' : ''}${context.parsed.y.toFixed(2)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim() || '#e2e8f0'
                            },
                            ticks: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#4a5568'
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#4a5568',
                                maxRotation: 45,
                                minRotation: 45,
                                font: { size: 10 }
                            }
                        }
                    }
                }
            });
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = 'toast';
            const icon = toast.querySelector('.toast-icon');
            
            if (type === 'success') {
                toast.classList.add('toast-success');
                if (icon) icon.className = 'fas fa-check-circle toast-icon';
            } else if (type === 'error') {
                toast.classList.add('toast-error');
                if (icon) icon.className = 'fas fa-exclamation-circle toast-icon';
            } else if (type === 'warning') {
                toast.classList.add('toast-warning');
                if (icon) icon.className = 'fas fa-exclamation-triangle toast-icon';
            }
            
            toastMessage.textContent = message;
            toast.style.display = 'flex';
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Clear Cache
        document.getElementById('clearCacheBtn').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/cache', { method: 'DELETE' });
                if (response.ok) {
                    showToast('Cache cleared successfully!', 'success');
                    if (currentData) {
                        displayResults(currentData);
                    }
                }
            } catch (error) {
                showToast('Error clearing cache: ' + error.message, 'error');
            }
        });

        // Export Data
        document.getElementById('exportData').addEventListener('click', function() {
            if (!currentData || !currentData.data) {
                showToast('No data to export', 'warning');
                return;
            }
            
            let csv = 'Sector,Trend,Performance,Stock Name,Price,Stock Code,Stock Change,Stock Trend\n';
            currentData.data.forEach(sector => {
                const sectorName = sector.sector || 'N/A';
                const sectorTrend = sector.trend || 'N/A';
                const sectorPerf = sector.percentage_change || 0;
                
                if (sector.stocks_data && sector.stocks_data.length > 0) {
                    sector.stocks_data.forEach(stock => {
                        csv += `${sectorName},${sectorTrend},${sectorPerf},${stock.stock_name || 'N/A'},${stock.price || 'N/A'},${stock.stock_code || 'N/A'},${stock.percentage_change || 0},${stock.stock_trend || 'N/A'}\n`;
                    });
                } else {
                    csv += `${sectorName},${sectorTrend},${sectorPerf},N/A,N/A,N/A,N/A,N/A\n`;
                }
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sector_analysis_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            showToast('Data exported successfully!', 'success');
        });

        // Event Listeners
        document.getElementById('fetchDataBtn').addEventListener('click', fetchData);
        document.getElementById('durationSelect').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchData();
        });

        // Auto-fetch on load with saved duration
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const select = document.getElementById('durationSelect');
                const savedDuration = localStorage.getItem('selectedDuration') || '1d';
                if (select) {
                    select.value = savedDuration;
                    fetchData();
                }
            }, 500);
        });

        // Save duration when changed
        document.getElementById('durationSelect').addEventListener('change', function() {
            localStorage.setItem('selectedDuration', this.value);
        });
    </script>
</body>
</html>
